<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a3a24"/>

  <!-- Lime green seedling / plant -->
  <!-- Stem -->
  <line x1="256" y1="390" x2="256" y2="220" stroke="#c8f542" stroke-width="22" stroke-linecap="round"/>

  <!-- Left leaf -->
  <path d="M256 240 C 256 190, 175 160, 140 160 C 140 200, 180 240, 256 240 Z"
        fill="#c8f542" stroke="none"/>

  <!-- Right leaf -->
  <path d="M256 240 C 256 190, 337 160, 372 160 C 372 200, 332 240, 256 240 Z"
        fill="#c8f542" stroke="none" opacity="0.85"/>

  <!-- Top shoot -->
  <path d="M256 220 C 256 180, 300 155, 320 140 C 305 160, 275 185, 256 220 Z"
        fill="#c8f542" stroke="none" opacity="0.7"/>

  <!-- Ground / soil arc -->
  <path d="M180 400 Q 256 380, 332 400" stroke="#c8f542" stroke-width="14"
        fill="none" stroke-linecap="round"/>
</svg>
